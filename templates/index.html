<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docket — README Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">§</span>
    <span class="brand-name">Docket</span>
  </div>
  <p class="brand-sub">a README, drafted properly</p>
</header>

<main class="workspace">

  <!-- LEFT: Editor panel -->
  <section class="pane editor-pane" aria-label="README details form">
    <div class="pane-tab">
      <span class="dot dot-a"></span><span class="dot dot-b"></span><span class="dot dot-c"></span>
      <span class="pane-tab-label">form.input</span>
    </div>

    <div class="template-bar">
      <label class="field-label" for="template-select">Start from a template</label>
      <select id="template-select">
        <option value="blank">Blank</option>
        <option value="minimal">Minimal</option>
        <option value="standard" selected>Standard</option>
        <option value="detailed">Open Source (detailed)</option>
      </select>
    </div>

    <form id="readme-form" class="form">

      <fieldset class="field-group">
        <legend>01 — Header</legend>

        <label class="field">
          <span class="field-label">Project name</span>
          <input type="text" name="project_name" placeholder="e.g. Docket" required>
        </label>

        <label class="field">
          <span class="field-label">Tagline</span>
          <input type="text" name="tagline" placeholder="One line that sells it">
        </label>

        <label class="field">
          <span class="field-label">Description</span>
          <textarea name="description" rows="3" placeholder="What does this project do, and who is it for?"></textarea>
        </label>
      </fieldset>

      <fieldset class="field-group">
        <legend>02 — Tech Stack</legend>
        <div class="repeatable" id="tech-stack-list" data-name="tech_stack" data-placeholder="e.g. Flask"></div>
        <button type="button" class="add-btn" data-target="tech-stack-list" data-placeholder="e.g. Flask">+ Add technology</button>
      </fieldset>

      <fieldset class="field-group">
        <legend>03 — Key Features</legend>
        <div class="repeatable" id="features-list" data-name="features" data-placeholder="e.g. Live Markdown preview"></div>
        <button type="button" class="add-btn" data-target="features-list" data-placeholder="e.g. Live Markdown preview">+ Add feature</button>
      </fieldset>

      <fieldset class="field-group">
        <legend>04 — Installation</legend>
        <label class="field">
          <span class="field-label">Setup commands</span>
          <textarea name="installation" rows="3" class="mono-input" placeholder="git clone https://github.com/you/project&#10;cd project&#10;pip install -r requirements.txt"></textarea>
        </label>
      </fieldset>

      <fieldset class="field-group">
        <legend>05 — Usage</legend>
        <label class="field">
          <span class="field-label">How does someone use it?</span>
          <textarea name="usage" rows="3" placeholder="Explain a typical run, with an example if useful."></textarea>
        </label>
      </fieldset>

      <fieldset class="field-group">
        <legend>06 — Contributing</legend>
        <label class="field">
          <span class="field-label">Contribution notes (optional)</span>
          <textarea name="contributing" rows="2" placeholder="Pull requests welcome. For major changes, open an issue first."></textarea>
        </label>
      </fieldset>

      <fieldset class="field-group">
        <legend>07 — License &amp; extras</legend>

        <label class="field">
          <span class="field-label">License</span>
          <select name="license">
            <option value="mit" selected>MIT</option>
            <option value="apache-2.0">Apache 2.0</option>
            <option value="gpl-3.0">GPL v3.0</option>
            <option value="bsd-3-clause">BSD 3-Clause</option>
            <option value="unlicense">Unlicense</option>
            <option value="none">No license</option>
          </select>
        </label>

        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" name="include_badges" checked>
            <span>Shields.io badges</span>
          </label>
          <label class="toggle">
            <input type="checkbox" name="include_toc" checked>
            <span>Table of contents</span>
          </label>
          <label class="toggle">
            <input type="checkbox" name="include_screenshot">
            <span>Screenshot placeholder</span>
          </label>
        </div>
      </fieldset>

    </form>
  </section>

  <!-- Perforated divider -->
  <div class="perforation" aria-hidden="true"></div>

  <!-- RIGHT: Preview panel -->
  <section class="pane preview-pane" aria-label="Rendered README preview">
    <div class="pane-tab pane-tab-preview">
      <span class="pane-tab-label">README.md</span>
      <span class="live-indicator"><span class="live-dot"></span>rendering live</span>
    </div>

    <div class="gh-filebar">
      <div class="gh-filebar-left">
        <svg class="gh-book-icon" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
          <path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.744 3.744 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.06 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Z"></path>
        </svg>
        <span class="gh-crumb">README.md</span>
      </div>
      <div class="gh-filebar-right">
        <span class="gh-chip">Preview</span>
        <span class="gh-chip gh-chip-muted">Code</span>
      </div>
    </div>

    <div class="preview-scroll">
      <article id="preview-output" class="markdown-body">
        <p class="empty-state">Start filling in the form — your README builds itself here, in real time.</p>
      </article>
    </div>

    <div class="action-bar">
      <button id="copy-btn" class="btn btn-ghost" type="button">Copy Markdown</button>
      <button id="download-btn" class="btn btn-primary" type="button">Download README.md</button>
    </div>
  </section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
